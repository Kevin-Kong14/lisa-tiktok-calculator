<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LISA Calculator V7</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Sarabun;
background:#f4f6f8;
margin:0;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

h1{
font-size:26px;
text-align:center;
margin-bottom:20px;
}

.card{
background:white;
padding:18px;
border-radius:14px;
margin-bottom:14px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

label{
font-weight:600;
font-size:14px;
}

input{
width:100%;
padding:10px;
font-size:18px;
margin-top:4px;
margin-bottom:12px;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:14px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff2d55;
color:white;
font-weight:bold;
}

.vat{
display:flex;
gap:8px;
margin-bottom:12px;
}

.vat button{
background:#222;
color:#aaa;
font-size:14px;
padding:10px;
}

.vat .active{
background:#ff2d55;
color:white;
}

.result{
font-size:22px;
font-weight:700;
}

.small{
font-size:14px;
color:#666;
}

.controls{
display:flex;
gap:8px;
margin-top:10px;
}

.controls button{
background:#444;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h1>LISA Calculator</h1>

<div class="card">

<label>Reference Price</label>
<input id="ref" type="number">

<label>Target Profit</label>
<input id="profit" type="number" value="70">

<label>Cost</label>
<input id="cost" type="number">

<div class="vat">
<button id="vat0" onclick="setVat(0)" class="active">ยังไม่จด VAT</button>
<button id="vat1" onclick="setVat(1)">จด VAT แล้ว</button>
</div>

<button onclick="calculate()">คำนวณราคา</button>

</div>

<div id="dashboard" class="card" style="display:none">

<div class="result" id="price"></div>
<div class="small">ราคาแนะนำ</div>

<hr>

<div>ราคาตลาด: <b id="refshow"></b></div>
<div>ส่วนลด: <b id="discount"></b></div>
<div>เงินเข้าร้าน: <b id="receive"></b></div>
<div>ค่าธรรมเนียม: <b id="fee"></b></div>
<div>VAT: <b id="vat"></b></div>
<div>กำไรสุทธิ: <b id="profitshow"></b></div>
<div>กำไร %: <b id="profitpercent"></b></div>

<div class="controls">

<button onclick="undo()">Undo</button>
<button onclick="redo()">Redo</button>
<button onclick="reset()">Reset</button>

</div>

</div>

</div>

<script>

let vatMode=0
let history=[]
let step=-1

function setVat(v){

vatMode=v

document.getElementById("vat0").classList.remove("active")
document.getElementById("vat1").classList.remove("active")

if(v==0){
document.getElementById("vat0").classList.add("active")
}else{
document.getElementById("vat1").classList.add("active")
}

}

function calculate(){

let ref=parseFloat(ref.value)
let cost=parseFloat(cost.value)
let target=parseFloat(profit.value)

let sr=ref

let fee=sr*0.1583

let vat=sr*(7/107)

let receive=sr-fee

let profit

if(vatMode==0){
profit=receive-cost
}else{
profit=receive-vat-cost
}

let discount=((ref-sr)/ref)*100

let percent=(profit/cost)*100

dashboard.style.display="block"

price.innerHTML="฿"+sr.toFixed(0)
refshow.innerHTML="฿"+ref
discount.innerHTML=discount.toFixed(1)+"%"
receive.innerHTML="฿"+receive.toFixed(2)
fee.innerHTML="฿"+fee.toFixed(2)
vat.innerHTML="฿"+vat.toFixed(2)
profitshow.innerHTML="฿"+profit.toFixed(2)
profitpercent.innerHTML=percent.toFixed(1)+"%"

saveState()

}

function saveState(){

let data={
ref:ref.value,
cost:cost.value,
profit:profit.value,
vatMode:vatMode
}

history=history.slice(0,step+1)

history.push(data)

step++

}

function undo(){

if(step<=0)return

step--

loadState(history[step])

}

function redo(){

if(step>=history.length-1)return

step++

loadState(history[step])

}

function loadState(data){

ref.value=data.ref
cost.value=data.cost
profit.value=data.profit

setVat(data.vatMode)

calculate()

}

function reset(){

ref.value=""
cost.value=""
profit.value="70"

dashboard.style.display="none"

history=[]
step=-1

}

</script>

</body>
</html>
