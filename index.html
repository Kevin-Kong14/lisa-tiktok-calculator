<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LISA Calculator V6</title>

<style>
body{
background:#0a0a0a;
color:white;
font-family:sans-serif;
max-width:420px;
margin:auto;
padding:20px;
}

h1{
font-size:22px;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
font-size:22px;
border-radius:12px;
border:none;
margin-bottom:12px;
background:#111;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:8px;
border-radius:12px;
border:none;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.calc{
background:#ff2d55;
color:white;
}

.copy{
background:#222;
color:white;
}

.result{
margin-top:20px;
padding:16px;
background:#111;
border-radius:12px;
}

.good{color:#34d399}
.bad{color:#ff6b6b}
</style>

</head>

<body>

<h1>✦ LISA Calculator V6</h1>

<input id="ref" type="number" placeholder="ราคาอ้างอิง">

<button class="calc" onclick="calc()">คำนวณราคา</button>

<div id="result" class="result" style="display:none">

<div>ราคาตั้งขาย: <b id="full"></b></div>
<div>ราคาลูกค้าจ่าย: <b id="sell"></b></div>
<div>กำไรสุทธิ: <b id="profit"></b></div>

<button class="copy" onclick="copySell()">Copy ราคาลูกค้าจ่าย</button>
<button class="copy" onclick="copyFull()">Copy ราคาตั้งขาย</button>

<h3>Affiliate Test</h3>

<div id="aff10"></div>
<div id="aff20"></div>
<div id="aff30"></div>

</div>

<script>

const PSYCH=[149,190,199,249,290,299,349,390,399,449,490,499,549,590,599,649,690,699,749,790,799,849,890,899,949,990,999]
const FEE=0.0299+0.0642+0.0642
const VATR=7/107

function fmt(n){
return n.toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2})
}

function calc(){

let ref=parseFloat(document.getElementById("ref").value)

localStorage.setItem("lisa_ref",ref)

let cost=ref-70

for(let sp of PSYCH){

let fees=sp*FEE
let vat=sp*VATR
let sr=sp-fees
let profit=sr-cost

if(profit<70) continue

let full=Math.ceil((cost*2.5)/100)*100

document.getElementById("full").innerText="฿"+fmt(full)
document.getElementById("sell").innerText="฿"+fmt(sp)
document.getElementById("profit").innerText="฿"+fmt(profit)

affTest(sp,cost)

document.getElementById("result").style.display="block"

window.sellPrice=sp
window.fullPrice=full

return
}

alert("ไม่พบราคาที่กำไรถึง 70")

}

function affTest(sp,cost){

let a10=sp*0.10
let a20=sp*0.20
let a30=sp*0.30

let sr=sp-(sp*FEE)

let p10=sr-a10-cost
let p20=sr-a20-cost
let p30=sr-a30-cost

document.getElementById("aff10").innerHTML="10% Affiliate → "+fmt(p10)
document.getElementById("aff20").innerHTML="20% Affiliate → "+fmt(p20)
document.getElementById("aff30").innerHTML="30% Affiliate → "+fmt(p30)

}

function copySell(){

navigator.clipboard.writeText(window.sellPrice)

alert("Copy ราคาลูกค้าจ่ายแล้ว")

}

function copyFull(){

navigator.clipboard.writeText(window.fullPrice)

alert("Copy ราคาตั้งขายแล้ว")

}

window.onload=function(){

let saved=localStorage.getItem("lisa_ref")

if(saved){
document.getElementById("ref").value=saved
}

}

</script>

</body>
</html>
